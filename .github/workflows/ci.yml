name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm test
      - name: Check coverage on changed lines
        run: pipx run diff-cover coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=90

  copilot-fix:
    name: Request Copilot Fix
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: failure()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';
            const failures = [];
            if (lintResult === 'failure') failures.push('**Lint & Type Check** \u2014 fix linting or type errors');
            if (testResult === 'failure') failures.push('**Tests & Coverage** \u2014 fix failing tests or improve coverage to \u226590%');
            const prUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.issue.number}`;
            const suggestion = '@copilot Please fix the CI failures listed above.';
            const body = [
              '## :x: CI Failed',
              '',
              'The following checks failed:',
              failures.map(f => `- ${f}`).join('\n'),
              '',
              '---',
              '',
              ':robot: **Ask Copilot to fix this** \u2014 copy the message below and paste it as a new comment on this PR:',
              '',
              '```',
              suggestion,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
