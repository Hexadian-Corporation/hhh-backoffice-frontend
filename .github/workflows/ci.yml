name: CI

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm test
      - name: Check coverage on changed lines
        run: pipx run diff-cover coverage/cobertura-coverage.xml --compare-branch=origin/main --fail-under=90

  copilot-fix:
    name: Request Copilot Fix
    needs: [lint, test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId,
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let report = '';

            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner, repo, job_id: job.id,
              });
              const raw = typeof logs.data === 'string' ? logs.data : Buffer.from(logs.data).toString('utf8');
              const clean = raw.replace(/\x1b\[[0-9;]*m/g, '');
              const tail = clean.split('\n').slice(-60).join('\n').slice(-3000);

              let desc = job.name;
              let fix = '';
              if (job.name.includes('Lint')) {
                desc = 'Lint & Type Check (ESLint + tsc --noEmit)';
                fix = [
                  '- Run `npm run lint -- --fix` to auto-fix ESLint issues',
                  '- Run `npx tsc --noEmit` locally to see type errors',
                  '- Check for missing imports, wrong types, or unused variables',
                ].join('\n');
              } else if (job.name.includes('Tests') || job.name.includes('Coverage')) {
                desc = 'Tests & Coverage (vitest + diff-cover \u2265 90%)';
                fix = [
                  '- Run `npm test` locally to reproduce the failure',
                  '- If diff-cover failed, add tests for uncovered changed lines',
                  '- Check that mocks and test fixtures match current code',
                ].join('\n');
              }

              report += `### \u274c ${desc}\n\n`;
              if (fix) report += `**Suggested fixes:**\n${fix}\n\n`;
              report += `<details><summary>Last 60 lines of log output</summary>\n\n\`\`\`\n${tail}\n\`\`\`\n\n</details>\n\n`;
            }

            const body = [
              '## \ud83d\udea8 CI Failure Report\n',
              `**Workflow run:** [#${runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${runId})\n`,
              report,
              '---\n',
              'To request an automated fix, copy and paste the following comment exactly:\n',
              '`````',
              '@copilot Please fix the CI failures listed above. The full error logs are included in the collapsed sections. Follow the suggested fixes for each failed job.',
              '`````',
            ].join('\n');

            const pr = context.payload.pull_request;
            if (pr) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number, body,
              });
            }
